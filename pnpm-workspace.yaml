packages:
  - apps/*
  - packages/*
  - tools/*

allowBuilds:
  '@prisma/engines': true
  '@prisma/client': true
  argon2: true
  esbuild: true
  prisma: true
  protobufjs: true
  sharp: true
  unrs-resolver: true

minimumReleaseAgeExclude:
  - prettier@3.8.5
  - electron-to-chromium

overrides:
  uuid@<11.1.1: '>=11.1.1'
  postcss@<8.5.10: '>=8.5.10'
  '@hono/node-server@<1.19.13': '>=1.19.13'
  '@opentelemetry/propagator-jaeger': '2.9.0'
  brace-expansion@1: '1.1.16'
  brace-expansion@2: '2.1.2'
  brace-expansion@5: '5.0.7'
  fast-uri: '3.1.4'
  js-yaml: '4.3.0'
  protobufjs: '7.6.5'
  sharp: '0.35.0'
