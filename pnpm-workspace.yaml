packages:
  - apps/*
  - packages/*
  - tools/*

allowBuilds:
  '@prisma/engines': true
  '@prisma/client': true
  argon2: true
  esbuild: true
  prisma: true
  protobufjs: true
  sharp: true
  unrs-resolver: true

minimumReleaseAgeExclude:
  - prettier@3.8.5
  - electron-to-chromium

overrides:
  uuid@<11.1.1: '>=11.1.1'
  postcss@<8.5.10: '>=8.5.10'
  '@hono/node-server@<1.19.13': '>=1.19.13'
