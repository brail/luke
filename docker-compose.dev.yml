services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       luke
      POSTGRES_USER:     luke
      POSTGRES_PASSWORD: luke_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U luke -d luke"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:              minioadmin
      MINIO_ROOT_PASSWORD:          minioadmin
      MINIO_API_CORS_ALLOW_ORIGIN:  "*"
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # Console UI
    volumes:
      - minio_dev_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/uploads &&
        mc mb --ignore-existing local/exports &&
        mc mb --ignore-existing local/assets &&
        mc mb --ignore-existing local/brand-logos &&
        mc mb --ignore-existing local/temp-brand-logos &&
        mc mb --ignore-existing local/collection-row-pictures &&
        mc mb --ignore-existing local/temp-collection-row-pictures &&
        mc mb --ignore-existing local/merchandising-specsheet-images &&
        mc mb --ignore-existing local/temp-merchandising-specsheet-images &&
        mc anonymous set download local/brand-logos &&
        mc anonymous set download local/collection-row-pictures &&
        mc anonymous set download local/merchandising-specsheet-images
      "
    restart: on-failure

volumes:
  postgres_dev_data:
  minio_dev_data:
