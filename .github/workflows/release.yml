name: Release

# Triggered by a version tag: git tag v1.2.3 && git push --tags
on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/brail/luke-api
  WEB_IMAGE: ghcr.io/brail/luke-web
  PNPM_VERSION: '10.32.1'

jobs:
  # ── Build & push API image ───────────────────────────────────────────────────
  build-api:
    name: Build API image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          # RC tags (v*-rc*): push version + rc-latest, never latest
          # Stable tags (v*): push version + major.minor + latest
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref_name, '-rc') }}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-rc') }}
            type=raw,value=rc-latest,enable=${{ contains(github.ref_name, '-rc') }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ github.ref_name }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

  # ── Build & push Web image ───────────────────────────────────────────────────
  build-web:
    name: Build Web image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set public hostname for web build
        id: hostname
        run: |
          if [[ "${{ github.ref_name }}" == *"-rc"* ]]; then
            echo "value=${{ vars.RC_PUBLIC_HOSTNAME }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ vars.PUBLIC_HOSTNAME }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref_name, '-rc') }}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-rc') }}
            type=raw,value=rc-latest,enable=${{ contains(github.ref_name, '-rc') }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # PUBLIC_HOSTNAME → prod, RC_PUBLIC_HOSTNAME → rc (both set as GitHub repo variables)
          build-args: |
            NEXT_PUBLIC_API_URL=http://${{ steps.hostname.outputs.value }}
            INTERNAL_API_URL=${{ contains(github.ref_name, '-rc') && 'http://api-rc:3001' || 'http://api:3001' }}
            APP_VERSION=${{ github.ref_name }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

