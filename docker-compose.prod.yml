# ──────────────────────────────────────────────────────────────────────────────
# Luke — Production Stack (Portainer)
#
# This file uses pre-built images from ghcr.io.
# Do NOT run docker compose build here — images are built by GitHub Actions CI.
#
# Required environment variables (set in Portainer Stack → Env):
#   POSTGRES_PASSWORD   — strong random password for the PostgreSQL user
#   NEXTAUTH_SECRET     — random string (openssl rand -base64 32)
#   PUBLIC_HOSTNAME     — public hostname, e.g. luke.example.com
#   COOKIE_SECURE       — "true" if behind HTTPS, "false" if plain HTTP
#
# To deploy a specific version instead of latest, change image tags to e.g.:
#   image: ghcr.io/brail/luke-api:1.2.3
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       luke
      POSTGRES_USER:     luke
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U luke -d luke"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Fastify API ──────────────────────────────────────────────────────────────
  api:
    image: ghcr.io/brail/luke-api:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV:        production
      PORT:            3001
      DATABASE_URL:    postgresql://luke:${POSTGRES_PASSWORD}@postgres:5432/luke
      # CORS: browser requests go through the web container (no direct API access)
      LUKE_CORS_ALLOWED_ORIGINS: ""
    volumes:
      # Persistent volume for master key (~/.luke/secret.key) and local file storage.
      # NEVER delete this volume — all JWT tokens derive from the master key.
      - api_data:/root/.luke
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ── Next.js web ───────────────────────────────────────────────────────────────
  web:
    image: ghcr.io/brail/luke-web:latest
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NODE_ENV:         production
      # Internal Docker URL used by Next.js SSR and middleware
      INTERNAL_API_URL: http://api:3001
      # NextAuth
      NEXTAUTH_URL:     http://${PUBLIC_HOSTNAME}
      NEXTAUTH_SECRET:  ${NEXTAUTH_SECRET}
      # Set to "true" when serving over HTTPS, "false" for plain HTTP
      COOKIE_SECURE:    ${COOKIE_SECURE:-false}

volumes:
  postgres_data:
  api_data:
